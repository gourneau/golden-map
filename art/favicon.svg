<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The Golden Map favicon: the golden record with its pulsar-map burst -->
  <defs>
    <radialGradient id="gold" cx="0.38" cy="0.34" r="1.05">
      <stop offset="0" stop-color="#f6dc82"/>
      <stop offset="0.55" stop-color="#e5bb4e"/>
      <stop offset="1" stop-color="#c99e38"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#gold)"/>
  <!-- pulsar map: burst of lines from the Sun (lower-left of the spindle,
       as on the real cover), long line to the galactic center -->
  <g stroke="#3e3220" stroke-width="1.6" stroke-linecap="round">
    <line x1="22" y1="41" x2="57" y2="37.5"/>
    <line x1="22" y1="41" x2="40" y2="13"/>
    <line x1="22" y1="41" x2="27" y2="10"/>
    <line x1="22" y1="41" x2="12" y2="15"/>
    <line x1="22" y1="41" x2="6"  y2="33"/>
    <line x1="22" y1="41" x2="8"  y2="50"/>
    <line x1="22" y1="41" x2="20" y2="57"/>
    <line x1="22" y1="41" x2="35" y2="54"/>
  </g>
  <!-- spindle hole, dead center like a real record -->
  <circle cx="32" cy="32" r="2.4" fill="#0a0805"/>
  <circle cx="32" cy="32" r="3.1" fill="none" stroke="#5a4010" stroke-opacity="0.6" stroke-width="0.9"/>
</svg>
