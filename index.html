:root {
  /* color */
  --void: #050403;          /* warm near-black: the anodized cover */
  --void-lift: #0d0a06;     /* raised panel */
  --gold: #c9a227;          /* engraved line */
  --gold-bright: #f2d478;   /* beacon flash, headings */
  --gold-dim: #6e5a1e;      /* ghost lines, hairlines */
  --gold-faint: #3a2f14;    /* borders, rules */
  --copper: #b87333;        /* record body accent */
  --paper: #e8dcc0;         /* body text on black */
  --paper-dim: #a89a7c;     /* secondary text */
  --starlight: #a9c3d4;     /* MODERN / corrected data only */
  --starlight-dim: #4a5c68;
  --alarm: #c96a4a;         /* errors on the map, used sparingly */

  /* type */
  --display: 'Marcellus', 'Times New Roman', serif;
  --body: 'EB Garamond', Georgia, serif;
  --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;

  /* scale */
  --step--1: 0.8rem;
  --step-0: 1.05rem;
  --step-1: 1.35rem;
  --step-2: 1.9rem;
  --step-3: 2.8rem;
  --step-4: 4.2rem;

  --rail-w: 300px;
  --panel-w: 400px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--void);
  color: var(--paper);
  font-family: var(--body);
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

#stage {
  position: fixed;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
}

#ui {
  position: fixed;
  inset: 0;
  pointer-events: none; /* children opt back in */
  z-index: 10;
}
#ui > * { pointer-events: auto; }

.noscript {
  position: fixed; inset: 40%;
  text-align: center; color: var(--gold);
  font-family: var(--display);
}

/* shared vocabulary for UI modules */
.eyebrow {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold);
}

h1, h2, h3, .display {
  font-family: var(--display);
  font-weight: 400;
  color: var(--gold-bright);
  letter-spacing: 0.02em;
}

.mono { font-family: var(--mono); }
.modern { color: var(--starlight); }     /* modern / corrected values */
.engraved { color: var(--gold); }        /* as-engraved values */
.flawed { color: var(--alarm); }

.hairline { border: 0; border-top: 1px solid var(--gold-faint); }

::selection { background: var(--gold-dim); color: var(--void); }

a { color: var(--gold); text-decoration-color: var(--gold-faint); text-underline-offset: 3px; }
a:hover { color: var(--gold-bright); }

button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
}
:focus-visible {
  outline: 1px solid var(--gold-bright);
  outline-offset: 3px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001s !important;
    transition-duration: 0.001s !important;
  }
}

/* ============================================================
   THE GOLDEN MAP — ui.css
   Owns everything inside #ui. Uses only tokens from style.css.
   Warm gold = as engraved (1969) · starlight = modern · alarm = flaws.
   ============================================================ */

/* ---- panel machinery: restrained translate + fade -------------------- */
.gm-panel {
  position: fixed;
  z-index: 20;
  opacity: 0;
  visibility: hidden;
  transform: var(--gm-in, translateY(14px));
  transition:
    opacity 0.6s var(--ease),
    transform 0.6s var(--ease),
    visibility 0s linear 0.6s;
}
.gm-panel.is-on {
  opacity: 1;
  visibility: visible;
  transform: none;
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
}

/* ---- shared sheet chrome ---------------------------------------------- */
.gm-sheet {
  background: color-mix(in srgb, var(--void-lift) 88%, transparent);
  border: 1px solid var(--gold-faint);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 1.35rem 1.5rem;
}
.gm-sheet h2 {
  font-size: var(--step-2);
  line-height: 1.15;
  margin: 0.35em 0 0.4em;
}
.gm-body {
  font-size: 0.98rem;
  color: var(--paper);
  max-width: 60ch;
}
.gm-nowrap { white-space: nowrap; }

/* thin engraved scrollbars */
.gm-sheet, .gm-rail-list, .gm-detail {
  scrollbar-width: thin;
  scrollbar-color: var(--gold-faint) transparent;
}
.gm-sheet::-webkit-scrollbar, .gm-rail-list::-webkit-scrollbar { width: 4px; }
.gm-sheet::-webkit-scrollbar-thumb,
.gm-rail-list::-webkit-scrollbar-thumb { background: var(--gold-faint); }

/* key–value rows (detail, crab clock) */
.gm-kv {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1.2em;
  padding: 0.45em 0;
  border-top: 1px solid color-mix(in srgb, var(--gold-faint) 55%, transparent);
}
.gm-k {
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--paper-dim);
}
.gm-v { font-size: 0.8rem; text-align: right; }

/* ======================================================================
   1. ACT NAV
   ====================================================================== */
#ui .gm-nav { pointer-events: none; }
.gm-nav {
  top: 0; left: 0; right: 0;
  z-index: 40;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 16px;
  --gm-in: translateY(-10px);
}
.gm-nav-row { display: flex; gap: 7px; pointer-events: auto; }
.gm-act {
  display: flex;
  align-items: center;
  gap: 0.55em;
  padding: 0.5em 0.95em;
  border: 1px solid var(--gold-faint);
  background: color-mix(in srgb, var(--void) 72%, transparent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  font-family: var(--display);
  font-size: 0.8rem;
  letter-spacing: 0.09em;
  color: var(--paper-dim);
  transition: color 0.3s var(--ease), border-color 0.3s var(--ease);
}
.gm-act-n { font-size: 0.66rem; font-weight: 500; letter-spacing: 0.12em; color: var(--gold-dim); }
.gm-act:hover { color: var(--gold-bright); border-color: var(--gold-dim); }
.gm-act.is-current { color: var(--gold-bright); border-color: var(--gold); }
.gm-act.is-current .gm-act-n { color: var(--gold); }
.gm-nav-progress {
  pointer-events: auto;
  width: min(540px, 74vw);
  height: 1px;
  margin-top: 13px;
  background: var(--gold-faint);
}
.gm-nav-progress i {
  display: block;
  height: 1px;
  width: 20%;
  background: var(--gold);
  transition: width 0.9s var(--ease);
}

/* ======================================================================
   2. TITLE CARD
   ====================================================================== */
#ui .gm-title { pointer-events: none; }
.gm-title {
  left: 0; right: 0;
  bottom: 10vh;
  z-index: 15;
  text-align: center;
  padding: 0 20px;
  --gm-in: translateY(22px);
}
.gm-title h1 {
  font-size: clamp(2.7rem, 7.5vw, var(--step-4));
  margin: 0.3em 0 0.25em;
  text-shadow: 0 0 44px color-mix(in srgb, var(--gold) 34%, transparent);
}
.gm-hook {
  max-width: 32em;
  margin: 0 auto 1.7em;
  font-size: var(--step-1);
  line-height: 1.5;
  color: var(--paper);
}
.gm-begin {
  pointer-events: auto;
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold);
  padding: 0.9em 1.8em;
  border: 1px solid var(--gold-faint);
  transition: color 0.3s var(--ease), border-color 0.3s var(--ease);
}
.gm-begin:hover { color: var(--gold-bright); border-color: var(--gold); }

/* ======================================================================
   3. EXPLAINER (left column)
   ====================================================================== */
.gm-left {
  left: 22px;
  top: 96px;
  width: min(430px, calc(100vw - 44px));
  max-height: calc(100vh - 200px);
  overflow-y: auto;
  --gm-in: translateX(-18px);
}
.gm-how {
  list-style: none;
  display: grid;
  gap: 0.8em;
  margin: 1.15em 0 0;
}
.gm-how li {
  font-size: 0.94rem;
  color: var(--paper-dim);
  border-left: 1px solid var(--gold-faint);
  padding-left: 0.95em;
  max-width: 60ch;
}
.gm-how b {
  display: block;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 0.58rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.2em;
}

/* the animated binary readout */
.gm-demo {
  margin-top: 1.3em;
  padding-top: 1.05em;
  border-top: 1px solid var(--gold-faint);
}
.gm-demo-ticks {
  margin-top: 0.7em;
  font-size: 0.74rem;
  letter-spacing: 0.1em;
  color: var(--gold-bright);
  min-height: 1.35em;
  white-space: nowrap;
  overflow: hidden;
}
.gm-demo-bits {
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  color: var(--gold-dim);
  min-height: 1.4em;
  white-space: nowrap;
  overflow: hidden;
}
.gm-demo.typing .gm-demo-bits::after {
  content: '▏';
  color: var(--gold);
  animation: gm-caret 0.9s steps(1) infinite;
}
@keyframes gm-caret { 50% { opacity: 0; } }
.gm-demo-result {
  margin-top: 0.55em;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  color: var(--paper-dim);
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);
}
.gm-demo.is-done .gm-demo-result { opacity: 1; transform: none; }

/* ======================================================================
   4. PULSAR RAIL
   ====================================================================== */
.gm-rail {
  left: 22px;
  top: 96px;
  width: var(--rail-w);
  max-height: calc(100vh - 210px);
  display: flex;
  flex-direction: column;
  padding: 1.1rem 0 0.4rem;
  --gm-in: translateX(-18px);
}
.gm-rail-head { padding: 0 1.1rem 0.7rem; }
.gm-rail-note { font-size: 0.74rem; font-style: italic; color: var(--paper-dim); }
.gm-rail-list { overflow-y: auto; }
.gm-row {
  display: grid;
  grid-template-columns: 1.7em 1fr auto 14px;
  gap: 0.55em;
  align-items: center;
  width: 100%;
  text-align: left;
  padding: 0.46em 1.1rem;
  border-top: 1px solid color-mix(in srgb, var(--gold-faint) 55%, transparent);
  transition: background 0.25s var(--ease);
}
.gm-row:hover { background: color-mix(in srgb, var(--gold) 7%, transparent); }
.gm-row.is-selected {
  background: color-mix(in srgb, var(--gold) 12%, transparent);
  box-shadow: inset 2px 0 0 var(--gold);
}
.gm-row-n { font-size: 0.6rem; color: var(--gold-dim); }
.gm-row-name { font-size: 0.92rem; color: var(--paper); }
.gm-row-alias { margin-left: 0.45em; font-style: italic; color: var(--gold-bright); }
.gm-row-conf {
  display: block;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 0.54rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--paper-dim);
}
.gm-row-p { font-size: 0.66rem; }
.gm-row-gc .gm-row-name { color: var(--copper); }
.gm-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  justify-self: center;
  background: var(--gold-dim);
  animation: gm-beat linear infinite;
}
.gm-dot-still { animation: none; background: var(--copper); }
@keyframes gm-beat {
  0%, 4% {
    background: var(--gold-bright);
    box-shadow: 0 0 7px 1px color-mix(in srgb, var(--gold-bright) 65%, transparent);
  }
  9%, 100% { background: var(--gold-dim); box-shadow: none; }
}

/* mobile rail toggle (hidden on desktop) */
.gm-rail-toggle {
  display: none;
  right: 14px;
  bottom: 14px;
  z-index: 45;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  padding: 0.75em 1.1em;
  border: 1px solid var(--gold-dim);
  background: var(--void-lift);
  --gm-in: translateY(10px);
}

/* ======================================================================
   5. DETAIL PANEL
   ====================================================================== */
.gm-detail {
  right: 22px;
  top: 96px;
  width: min(var(--panel-w), calc(100vw - 44px));
  max-height: calc(100vh - 200px);
  overflow-y: auto;
  z-index: 30;
  --gm-in: translateX(18px);
}
.gm-close {
  position: sticky;
  top: 0;
  float: right;
  font-family: var(--mono);
  font-size: 0.7rem;
  line-height: 1;
  color: var(--paper-dim);
  padding: 0.35em 0.45em;
  border: 1px solid transparent;
  transition: color 0.25s var(--ease), border-color 0.25s var(--ease);
}
.gm-close:hover { color: var(--gold-bright); border-color: var(--gold-faint); }
.gm-detail-name { font-size: var(--step-2); margin: 0.3em 0 0.05em; }
.gm-detail-sub { font-size: 0.62rem; letter-spacing: 0.12em; color: var(--paper-dim); margin-bottom: 1em; }
.gm-bin-label { display: block; margin: 0.9em 0 0.3em; }
.gm-bin {
  font-size: 0.76rem;
  line-height: 1.75;
  letter-spacing: 0.13em;
  color: var(--gold);
  word-break: break-all;
  margin-bottom: 0.9em;
}
.gm-detail-note {
  font-size: 0.82rem;
  color: var(--paper-dim);
  padding: 0.3em 0 0.5em;
  max-width: 60ch;
}
.gm-detail-story {
  font-size: 0.94rem;
  margin-top: 0.9em;
  padding-top: 0.8em;
  border-top: 1px solid color-mix(in srgb, var(--gold-faint) 55%, transparent);
}
.gm-flaw {
  margin-top: 1em;
  padding: 0.8em 0.95em;
  border: 1px solid color-mix(in srgb, var(--alarm) 45%, transparent);
  color: var(--alarm);
  font-size: 0.88rem;
}
.gm-flaw-label {
  font-size: 0.56rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 0.35em;
}

/* ======================================================================
   6. VERDICT PANEL
   ====================================================================== */
.gm-verdict {
  left: calc(var(--rail-w) + 40px);
  top: 96px;
  width: min(430px, calc(100vw - 44px));
  max-height: calc(100vh - 200px);
  overflow-y: auto;
  --gm-in: translateX(-18px);
}
.gm-verdict-lede {
  font-size: var(--step-1);
  color: var(--paper);
  margin-bottom: 0.9em;
}
.gm-verdict-lede em { color: var(--gold-bright); }
.gm-block-h {
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin: 1.3em 0 0.5em;
  padding-top: 0.9em;
  border-top: 1px solid var(--gold-faint);
}
.gm-list {
  list-style: none;
  display: grid;
  gap: 0.55em;
}
.gm-list li {
  font-size: 0.92rem;
  color: var(--paper-dim);
  padding-left: 0.95em;
  border-left: 1px solid var(--gold-faint);
  max-width: 60ch;
}
.gm-modes-label { display: block; margin: 1.4em 0 0.45em; }
.gm-modes { display: flex; flex-wrap: wrap; gap: 6px; }
.gm-mode {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.65em 0.85em;
  border: 1px solid var(--gold-faint);
  color: var(--paper-dim);
  transition: color 0.25s var(--ease), border-color 0.25s var(--ease), background 0.25s var(--ease);
}
.gm-mode:hover { color: var(--paper); border-color: var(--gold-dim); }
.gm-mode.is-active {
  color: var(--gold-bright);
  border-color: var(--gold);
  background: color-mix(in srgb, var(--gold) 10%, transparent);
}
.gm-mode[data-mode='modern'].is-active {
  color: var(--starlight);
  border-color: var(--starlight-dim);
  background: color-mix(in srgb, var(--starlight) 10%, transparent);
}
.gm-crab {
  margin-top: 1.3em;
  padding: 0.95em 1.05em;
  border: 1px solid var(--gold-faint);
  background: color-mix(in srgb, var(--gold) 4%, transparent);
}
.gm-crab-f { font-size: 0.68rem; color: var(--paper-dim); margin: 0.5em 0 0.4em; }
.gm-crab-line { font-size: 0.9rem; font-style: italic; color: var(--paper-dim); margin-top: 0.6em; }
.gm-crab-line em { color: var(--gold-bright); font-style: normal; }

/* ======================================================================
   7. FINDERS PANEL + 8. SOURCES
   ====================================================================== */
.gm-finders {
  left: 0; right: 0;
  bottom: 22px;
  margin: 0 auto;
  width: min(660px, calc(100vw - 32px));
  z-index: 25;
  --gm-in: translateY(18px);
}
.gm-time-row {
  display: flex;
  justify-content: space-between;
  gap: 1em;
  margin-top: 0.8em;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
}
.gm-tplus { color: var(--gold-bright); }
.gm-beacons { color: var(--paper-dim); }
.gm-slider-wrap { position: relative; margin: 1em 0 1.9em; }
.gm-slider {
  -webkit-appearance: none;
  appearance: none;
  display: block;
  width: 100%;
  height: 14px;
  background: transparent;
  cursor: pointer;
}
.gm-slider::-webkit-slider-runnable-track {
  height: 2px;
  background: linear-gradient(to right, var(--gold), var(--gold-faint));
}
.gm-slider::-moz-range-track {
  height: 2px;
  background: linear-gradient(to right, var(--gold), var(--gold-faint));
}
.gm-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  margin-top: -5.5px;
  border-radius: 50%;
  background: var(--void);
  border: 1px solid var(--gold-bright);
  box-shadow: 0 0 9px color-mix(in srgb, var(--gold-bright) 45%, transparent);
}
.gm-slider::-moz-range-thumb {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--void);
  border: 1px solid var(--gold-bright);
  box-shadow: 0 0 9px color-mix(in srgb, var(--gold-bright) 45%, transparent);
}
.gm-ticks { position: absolute; left: 0; right: 0; top: 100%; height: 1.2em; }
.gm-tick {
  position: absolute;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 0.54rem;
  letter-spacing: 0.08em;
  color: var(--paper-dim);
  padding-top: 0.45em;
}
.gm-tick::before {
  content: '';
  position: absolute;
  top: -2px;
  left: 50%;
  width: 1px;
  height: 5px;
  background: var(--gold-dim);
}
.gm-era {
  font-size: 0.98rem;
  font-style: italic;
  color: var(--paper);
  min-height: 1.6em;
}
.gm-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 0.85em; }
.gm-chip {
  font-size: 0.56rem;
  letter-spacing: 0.06em;
  color: var(--paper-dim);
  border: 1px solid var(--gold-faint);
  padding: 0.55em 0.75em;
}
.gm-sources { margin-top: 1em; border-top: 1px solid var(--gold-faint); padding-top: 0.7em; }
.gm-sources summary {
  cursor: pointer;
  list-style: none;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
}
.gm-sources summary::-webkit-details-marker { display: none; }
.gm-sources summary::after { content: ' +'; color: var(--gold-dim); }
.gm-sources[open] summary::after { content: ' −'; }
.gm-sources ul { list-style: none; margin-top: 0.6em; display: grid; gap: 0.3em; }
.gm-sources li { font-size: 0.82rem; }

/* ======================================================================
   9. CORNER MARK
   ====================================================================== */
.gm-corner {
  left: 16px;
  bottom: 13px;
  z-index: 12;
  font-size: 0.55rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dim);
}

/* ======================================================================
   RESPONSIVE — below 900px panels become sheets, rail becomes a drawer
   ====================================================================== */
@media (max-width: 900px) {
  .gm-act-t { display: none; }
  .gm-act { padding: 0.5em 0.75em; }
  .gm-title { bottom: 8vh; }
  .gm-hook { font-size: var(--step-0); }

  .gm-left,
  .gm-verdict {
    left: 12px; right: 12px;
    top: auto; bottom: 12px;
    width: auto;
    max-height: 56vh;
  }
  .gm-detail {
    left: 12px; right: 12px;
    top: auto; bottom: 12px;
    width: auto;
    max-height: 62vh;
  }

  .gm-rail {
    left: 0; right: 0;
    top: auto; bottom: 0;
    width: auto;
    max-height: 64vh;
    border-left: none;
    border-right: none;
    border-bottom: none;
    z-index: 32;
  }
  .gm-rail.is-on:not(.sheet-open) {
    opacity: 0;
    visibility: hidden;
    transform: translateY(8%);
  }
  .gm-rail.is-on.sheet-open { opacity: 1; visibility: visible; transform: none; }
  .gm-rail-toggle { display: block; }

  .gm-finders { bottom: 60px; width: calc(100vw - 24px); }
  .gm-corner { display: none; }
}

/* ======================================================================
   REDUCED MOTION — style.css already collapses durations; also stop loops
   ====================================================================== */
@media (prefers-reduced-motion: reduce) {
  .gm-dot { animation: none; background: var(--gold); }
  .gm-demo.typing .gm-demo-bits::after { animation: none; }
}

</style>
